name: Go

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Race test
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: go test -race ./...

      - name: Check module tidiness
        run: go mod tidy -diff

      - name: Check whitespace
        run: git diff --check

  live-runtime-regression-matrix:
    name: Live Runtime Checks
    needs:
      - verify
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - config_name: wjx
            survey_url: https://v.wjx.cn/vm/ei3sVrE.aspx
          - config_name: credamo
            survey_url: https://www.credamo.com/s/A73QR3ano
          - config_name: tencent
            survey_url: https://wj.qq.com/s2/26070328/fa89/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run live runtime regression for ${{ matrix.config_name }}
        env:
          SURVEY_CONTROLLER_LIVE_TEST_URL: ${{ matrix.survey_url }}
        run: go test ./CI/live_tests -run TestLiveRuntimeRegression -count=1 -timeout=5m -v

  live-runtime-regression:
    name: Live Parser Regression
    if: ${{ always() && needs.verify.result == 'success' }}
    needs:
      - verify
      - live-runtime-regression-matrix
    runs-on: windows-latest

    steps:
      - name: Verify matrix result
        shell: powershell
        run: |
          $result = "${{ needs.live-runtime-regression-matrix.result }}"
          Write-Host "Live runtime regression matrix result: $result"
          if ($result -ne "success") {
            throw "Live runtime regression did not pass."
          }
