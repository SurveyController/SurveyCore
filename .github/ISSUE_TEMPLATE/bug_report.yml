name: Bug Report
description: Report a reproducible problem.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Please confirm that the target survey or test fixture is authorized before reporting runtime behavior.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: List the exact steps, command, config, and fixture.
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Go version:
        surveyctl version:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: text
  - type: checkboxes
    id: authorization
    attributes:
      label: Authorization
      options:
        - label: I confirm this report does not require unauthorized access or abuse of a third-party survey.
          required: true
