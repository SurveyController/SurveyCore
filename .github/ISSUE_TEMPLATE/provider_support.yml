name: Provider Support
description: Track parser or runtime work for a survey provider.
title: "[Provider]: "
body:
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - WJX
        - Tencent Questionnaire
        - Credamo
        - Other
    validations:
      required: true
  - type: dropdown
    id: capability
    attributes:
      label: Capability
      options:
        - URL detection
        - Parser
        - Config generation
        - Browser runtime
        - HTTP runtime
        - Hybrid runtime
        - Tests
        - Documentation
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Include fixture expectations, platform behavior, and known limits.
    validations:
      required: true
  - type: checkboxes
    id: authorization
    attributes:
      label: Authorization
      options:
        - label: I confirm any referenced survey or fixture can be used for authorized development and testing.
          required: true
